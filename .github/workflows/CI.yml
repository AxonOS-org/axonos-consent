name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  # Fixes the Node.js 20 deprecation warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Run Tests
        run: |
          cargo test
          cargo test --features json

      - name: Fuzzing Smoke Test
        # If this fails with 101, check if your fuzz targets exist
        run: |
          cargo fuzz run fuzz_cbor_decode -- -max_total_time=10
          cargo fuzz run fuzz_cbor_roundtrip -- -max_total_time=10
