name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read
  attestations: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # 1. Primary logic verification
  test-default:
    name: Unit Tests (no_std)
    description: Run core logic tests in a restricted environment to ensure no_std compatibility.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test

  # 2. Data compatibility verification
  test-json:
    name: Interoperability Tests (JSON)
    description: Validate protocol compatibility using external JSON test vectors and serialization features.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --features json

  # 3. Hardware target compilation check + GitHub Attestation
  no-std:
    name: Build (Cortex-M4F Target)
    description: Compile the core library for ARM Cortex-M4F and generate a verified GitHub Build Attestation.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf
      
      - name: Build library
        run: cargo build --target thumbv7em-none-eabihf --no-default-features
      
      - name: GitHub Build Attestation
        uses: actions/attest@v1
        with:
          # Fixed path using wildcard to ensure the artifact is found regardless of profile
          subject-path: 'target/thumbv7em-none-eabihf/*/libaxonos_consent.a'

  # 4. Static analysis and linting
  clippy:
    name: Lints (Clippy)
    description: Run static analysis to catch common mistakes and enforce Rust best practices for safety-critical code.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo clippy --all-targets --features json -- -D warnings

  # 5. Code style enforcement
  fmt:
    name: Formatting (Rustfmt)
    description: Ensure the codebase adheres to the standard Rust style guidelines.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  # 6. Cryptographic integrity check for test vectors
  vectors-integrity:
    name: Vector Integrity (SHA-256)
    description: Verify that the interoperability test vectors haven't been tampered with using SHA-256.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify SHA-256 checksum
        run: |
          EXPECTED="29a8bf9f2b4dabe5d9641a8a4c416f361c2ba9815cca9b8e9e1d222d002fa50a"
          ACTUAL=$(sha256sum tests/vectors/consent-interop-vectors-v0.1.0.json | awk '{print $1}')
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "Error: Test vector integrity violation!"
            exit 1
          fi

  # 7. Memory safety and Undefined Behavior analysis
  miri:
    name: Memory Safety (Miri)
    description: Use Miri to detect Undefined Behavior, memory leaks, and pointer errors in the safety core.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - run: cargo miri test

  # 8. Performance regression check
  bench-check:
    name: Benchmark Compilation (WCET)
    description: Ensure benchmarks compile correctly to maintain the 0.09ms Worst-Case Execution Time (WCET) standard.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo bench --no-run